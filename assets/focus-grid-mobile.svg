<svg xmlns="http://www.w3.org/2000/svg" viewBox="0 0 620 540" width="620" height="540" fill="none" role="img" aria-label="Current focus">
  <defs>
    <filter id="e" x="-25%" y="-25%" width="150%" height="150%">
      <feTurbulence type="fractalNoise" baseFrequency="0.02" numOctaves="2" seed="4" result="n">
        <animate attributeName="baseFrequency" dur="8s" values="0.018;0.03;0.018" repeatCount="indefinite"/>
        <animate attributeName="seed" dur="2.6s" values="4;12;6;14;4" calcMode="discrete" repeatCount="indefinite"/>
      </feTurbulence>
      <feDisplacementMap in="SourceGraphic" in2="n" scale="9" xChannelSelector="R" yChannelSelector="G"/>
    </filter>
    <filter id="g" x="-40%" y="-40%" width="180%" height="180%">
      <feGaussianBlur stdDeviation="3.4" result="b"/>
      <feMerge><feMergeNode in="b"/><feMergeNode in="SourceGraphic"/></feMerge>
    </filter>
    <style>
      .card{animation:fl 6s ease-in-out infinite;transform-box:fill-box;transform-origin:center}
      .c2{animation-delay:.7s}.c3{animation-delay:1.4s}.c4{animation-delay:2.1s}
      @keyframes fl{0%,100%{transform:translateY(0)}50%{transform:translateY(-6px)}}
      text{font-family:'Trebuchet MS','Segoe UI',Verdana,sans-serif}
    </style>
  </defs>

  <!-- Founder (violet) -->
  <g class="card">
    <rect x="20" y="20" width="280" height="230" rx="20" fill="#0c0820" fill-opacity="0.6"/>
    <g filter="url(#g)"><rect x="20" y="20" width="280" height="230" rx="20" fill="none" stroke="#7b5cff" stroke-width="2" filter="url(#e)"/></g>
    <g transform="translate(160,84)" stroke="#7b5cff" stroke-width="2.6" stroke-linejoin="round" stroke-linecap="round">
      <path d="M-22 10 L-26 -12 L-10 -1 L0 -19 L10 -1 L26 -12 L22 10 Z" fill="#7b5cff" fill-opacity="0.14"/>
      <line x1="-20" y1="14" x2="20" y2="14"/>
      <g fill="#7b5cff" stroke="none"><circle cx="-26" cy="-12" r="2.4"/><circle cx="0" cy="-19" r="2.4"/><circle cx="26" cy="-12" r="2.4"/></g>
    </g>
    <text x="160" y="152" text-anchor="middle" font-size="23" font-weight="800" fill="#c9b8ff" letter-spacing="1">FOUNDER &amp; CEO</text>
    <text x="160" y="184" text-anchor="middle" font-size="15.5" fill="#8a7fb8">Five AM Labs Pvt Ltd</text>
    <text x="160" y="214" text-anchor="middle" font-size="13" fill="#5a5380" letter-spacing="2">BUILDING THE FUTURE</text>
  </g>

  <!-- AI/ML (cyan) -->
  <g class="card c2">
    <rect x="320" y="20" width="280" height="230" rx="20" fill="#06121a" fill-opacity="0.6"/>
    <g filter="url(#g)"><rect x="320" y="20" width="280" height="230" rx="20" fill="none" stroke="#7df9ff" stroke-width="2" filter="url(#e)"/></g>
    <g transform="translate(460,83)" stroke="#7df9ff" stroke-width="2.4" stroke-linejoin="round" stroke-linecap="round">
      <rect x="-14" y="-14" width="28" height="28" rx="3" fill="#7df9ff" fill-opacity="0.08"/>
      <rect x="-6" y="-6" width="12" height="12" rx="1.5"/>
      <path d="M-6 -14 V-19 M0 -14 V-19 M6 -14 V-19 M-6 14 V19 M0 14 V19 M6 14 V19 M-14 -6 H-19 M-14 0 H-19 M-14 6 H-19 M14 -6 H19 M14 0 H19 M14 6 H19"/>
    </g>
    <text x="460" y="152" text-anchor="middle" font-size="23" font-weight="800" fill="#aef3ff" letter-spacing="1">AI&#47;ML ENGINEER</text>
    <text x="460" y="184" text-anchor="middle" font-size="15.5" fill="#6fb6c4">Scopeout &#183; Intern</text>
    <text x="460" y="214" text-anchor="middle" font-size="13" fill="#3f8090" letter-spacing="2">ML &#183; RAG &#183; LLMs</text>
  </g>

  <!-- Full-stack (green) -->
  <g class="card c3">
    <rect x="20" y="290" width="280" height="230" rx="20" fill="#06160f" fill-opacity="0.6"/>
    <g filter="url(#g)"><rect x="20" y="290" width="280" height="230" rx="20" fill="none" stroke="#00ffa3" stroke-width="2" filter="url(#e)"/></g>
    <g transform="translate(160,352)" stroke="#00ffa3" stroke-width="2.4" stroke-linejoin="round" stroke-linecap="round">
      <path d="M0 -22 L22 -12 L0 -2 L-22 -12 Z" fill="#00ffa3" fill-opacity="0.16"/>
      <path d="M-22 0 L0 10 L22 0" fill="#00ffa3" fill-opacity="0.10"/>
      <path d="M-22 12 L0 22 L22 12" fill="#00ffa3" fill-opacity="0.05"/>
    </g>
    <text x="160" y="422" text-anchor="middle" font-size="23" font-weight="800" fill="#9bffd6" letter-spacing="1">FULL&#8209;STACK DEV</text>
    <text x="160" y="454" text-anchor="middle" font-size="15.5" fill="#5fc79c">MentorLink &#183; Intern</text>
    <text x="160" y="484" text-anchor="middle" font-size="13" fill="#3a8568" letter-spacing="1.5">REACT &#183; NODE &#183; MONGO</text>
  </g>

  <!-- Student (rose) -->
  <g class="card c4">
    <rect x="320" y="290" width="280" height="230" rx="20" fill="#1a0a12" fill-opacity="0.6"/>
    <g filter="url(#g)"><rect x="320" y="290" width="280" height="230" rx="20" fill="none" stroke="#ff6b9d" stroke-width="2" filter="url(#e)"/></g>
    <g transform="translate(460,353)" stroke="#ff6b9d" stroke-width="2.4" stroke-linejoin="round" stroke-linecap="round">
      <path d="M0 -14 L26 -4 L0 6 L-26 -4 Z" fill="#ff6b9d" fill-opacity="0.16"/>
      <path d="M-12 1 L-12 11 Q0 18 12 11 L12 1" fill="none"/>
      <path d="M26 -4 L26 14"/><circle cx="26" cy="16" r="2.8" fill="#ff6b9d" stroke="none"/>
    </g>
    <text x="460" y="422" text-anchor="middle" font-size="23" font-weight="800" fill="#ffb3cd" letter-spacing="1">B.TECH &#183; CSE</text>
    <text x="460" y="454" text-anchor="middle" font-size="15.5" fill="#c47d97">Dayananda Sagar</text>
    <text x="460" y="484" text-anchor="middle" font-size="13" fill="#90546a" letter-spacing="2">BENGALURU, INDIA</text>
  </g>
</svg>
