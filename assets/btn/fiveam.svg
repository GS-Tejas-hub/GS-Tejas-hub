    <g filter="url(#ablur)">
      <ellipse cx="70" cy="40" rx="60" ry="34" fill="#7b5cff" opacity="0.85"><animateTransform attributeName="transform" type="translate" values="0 0;120 18;0 0" dur="9s" repeatCount="indefinite"/></ellipse>
      <ellipse cx="200" cy="80" rx="70" ry="38" fill="#00ffa3" opacity="0.6"><animateTransform attributeName="transform" type="translate" values="0 0;-90 -22;0 0" dur="11s" repeatCount="indefinite"/></ellipse>
      <ellipse cx="290" cy="40" rx="60" ry="34" fill="#7df9ff" opacity="0.6"><animateTransform attributeName="transform" type="translate" values="0 0;-70 26;0 0" dur="8s" repeatCount="indefinite"/></ellipse>
