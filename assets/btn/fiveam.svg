    <filter id="ablur" x="-50%" y="-50%" width="200%" height="200%"><feGaussianBlur stdDeviation="22"/></filter>
    <filter id="ash" x="-30%" y="-30%" width="160%" height="160%"><feDropShadow dx="0" dy="5" stdDeviation="8" flood-color="#5a32c8" flood-opacity="0.4"/></filter>
  </defs>
  <rect x="14" y="14" width="322" height="82" rx="22" fill="#0d0a1e" filter="url(#ash)"/>
