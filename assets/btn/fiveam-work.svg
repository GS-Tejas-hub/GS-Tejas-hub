      <stop offset="0" stop-color="#f4f7fa"/>
      <stop offset="0.42" stop-color="#b9c2cd"/>
      <stop offset="0.5" stop-color="#717c8c"/>
      <stop offset="0.58" stop-color="#aab4c1"/>
