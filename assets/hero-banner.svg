<svg xmlns="http://www.w3.org/2000/svg" viewBox="0 0 1200 400" width="1200" height="400" fill="none" role="img" aria-label="G S Tejas - Full-Stack Developer, AI/ML Engineer, Founder">
  <desc>Animated cyber-neon banner for G S Tejas</desc>
  <defs>
    <!-- background glow -->
    <radialGradient id="bg" cx="50%" cy="38%" r="80%">
      <stop offset="0%" stop-color="#1b1248"/>
      <stop offset="42%" stop-color="#0c0820"/>
      <stop offset="100%" stop-color="#06040d"/>
    </radialGradient>

    <!-- animated gradient for the name (seamless, period = 500) -->
    <linearGradient id="nameGrad" gradientUnits="userSpaceOnUse" x1="350" y1="0" x2="850" y2="0" spreadMethod="repeat">
      <stop offset="0"    stop-color="#7df9ff"/>
      <stop offset="0.25" stop-color="#7b5cff"/>
      <stop offset="0.5"  stop-color="#00ffa3"/>
      <stop offset="0.75" stop-color="#7b5cff"/>
      <stop offset="1"    stop-color="#7df9ff"/>
      <animateTransform attributeName="gradientTransform" type="translate" from="0 0" to="500 0" dur="6s" repeatCount="indefinite"/>
    </linearGradient>

    <!-- flowing gradient for the electric border -->
    <linearGradient id="borderGrad" gradientUnits="userSpaceOnUse" x1="0" y1="0" x2="600" y2="0" spreadMethod="repeat">
      <stop offset="0"   stop-color="#7df9ff"/>
      <stop offset="0.5" stop-color="#7b5cff"/>
      <stop offset="1"   stop-color="#7df9ff"/>
      <animateTransform attributeName="gradientTransform" type="translate" from="0 0" to="600 0" dur="5s" repeatCount="indefinite"/>
    </linearGradient>

    <!-- ElectricBorder recreation: turbulence + displacement -->
    <filter id="electric" x="-30%" y="-30%" width="160%" height="160%">
      <feTurbulence type="fractalNoise" baseFrequency="0.013" numOctaves="2" seed="2" result="noise">
        <animate attributeName="baseFrequency" dur="9s" values="0.012;0.021;0.012" repeatCount="indefinite"/>
        <animate attributeName="seed" dur="3s" values="2;9;4;11;2" calcMode="discrete" repeatCount="indefinite"/>
      </feTurbulence>
      <feDisplacementMap in="SourceGraphic" in2="noise" scale="16" xChannelSelector="R" yChannelSelector="G"/>
    </filter>

    <!-- glow -->
    <filter id="glow" x="-40%" y="-40%" width="180%" height="180%">
      <feGaussianBlur stdDeviation="5" result="b"/>
      <feMerge><feMergeNode in="b"/><feMergeNode in="b"/><feMergeNode in="SourceGraphic"/></feMerge>
    </filter>
    <filter id="textGlow" x="-20%" y="-60%" width="140%" height="220%">
      <feGaussianBlur stdDeviation="6" result="b"/>
      <feMerge><feMergeNode in="b"/><feMergeNode in="SourceGraphic"/></feMerge>
    </filter>

    <style>
      .tw  { animation: tw 3s   ease-in-out infinite; }
      .tw2 { animation: tw 2.2s ease-in-out infinite .6s; }
      .tw3 { animation: tw 3.7s ease-in-out infinite 1.1s; }
      @keyframes tw { 0%,100% { opacity:.12 } 50% { opacity:1 } }
      .flick  { animation: fl 2.6s steps(1) infinite; }
      .flick2 { animation: fl 3.4s steps(1) infinite .8s; }
      @keyframes fl { 0%,7%,12%,100% { opacity:.28 } 9%,55% { opacity:.06 } 60%,70% { opacity:.4 } }
      .float  { animation: ft 7s ease-in-out infinite; transform-box: fill-box; transform-origin: center; }
      @keyframes ft { 0%,100% { transform: translateY(0) } 50% { transform: translateY(-5px) } }
      .pulse { animation: pl 3.2s ease-in-out infinite; }
      @keyframes pl { 0%,100% { opacity:.45 } 50% { opacity:1 } }
      .dash { stroke-dasharray: 14 10; animation: dh 1.6s linear infinite; }
      @keyframes dh { to { stroke-dashoffset: -48 } }
    </style>
  </defs>

  <!-- backdrop -->
  <rect width="1200" height="400" rx="30" fill="url(#bg)"/>

  <!-- starfield -->
  <g fill="#cfe9ff">
    <circle class="tw"  cx="90"   cy="70"  r="1.6"/>
    <circle class="tw2" cx="300"  cy="86"  r="1.9"/>
    <circle class="tw3" cx="560"  cy="64"  r="1.4"/>
    <circle class="tw"  cx="840"  cy="96"  r="1.3"/>
    <circle class="tw2" cx="1100" cy="78"  r="1.7"/>
    <circle class="tw3" cx="180"  cy="312" r="1.5"/>
    <circle class="tw"  cx="430"  cy="332" r="1.3"/>
    <circle class="tw2" cx="700"  cy="320" r="1.7"/>
    <circle class="tw3" cx="980"  cy="316" r="1.4"/>
    <circle class="tw"  cx="1132" cy="322" r="1.5"/>
    <circle class="tw2" cx="60"   cy="208" r="1.2"/>
    <circle class="tw3" cx="1150" cy="190" r="1.5"/>
    <circle class="tw"  cx="250"  cy="180" r="1.0"/>
    <circle class="tw2" cx="380"  cy="58"  r="1.1"/>
    <circle class="tw3" cx="760"  cy="56"  r="1.2"/>
    <circle class="tw"  cx="1040" cy="176" r="1.4"/>
  </g>

  <!-- lightning bolts (Lightning component vibe) -->
  <g stroke="#7df9ff" stroke-width="2" fill="none" filter="url(#glow)" stroke-linecap="round" stroke-linejoin="round">
    <path class="flick"  d="M120 40 L150 120 L122 132 L168 230 L138 244 L182 340"/>
    <path class="flick2" d="M1080 44 L1052 118 L1082 130 L1040 224 L1070 238 L1028 336" stroke="#7b5cff"/>
  </g>

  <!-- electric border (ElectricBorder recreation): glow layer + crackle stroke -->
  <g filter="url(#glow)">
    <rect x="26" y="26" width="1148" height="348" rx="26" fill="none" stroke="url(#borderGrad)" stroke-width="2.4" filter="url(#electric)"/>
  </g>

  <!-- HUD corner brackets -->
  <g stroke="#00ffa3" stroke-width="2.4" fill="none" class="pulse" stroke-linecap="round">
    <path d="M54 86 L54 54 L86 54"/>
    <path d="M1146 86 L1146 54 L1114 54"/>
    <path d="M54 314 L54 346 L86 346"/>
    <path d="M1146 314 L1146 346 L1114 346"/>
  </g>

  <!-- content -->
  <g class="float">
    <text x="600" y="150" text-anchor="middle" font-family="'Trebuchet MS', 'Segoe UI', Verdana, sans-serif"
          font-size="15" letter-spacing="7" fill="#00ffa3" opacity="0.9">&#8249; DEMON_KING &#47;&#47; 001 &#8250;</text>

    <text x="600" y="244" text-anchor="middle" font-family="'Trebuchet MS', 'Segoe UI', Verdana, sans-serif"
          font-size="96" font-weight="800" letter-spacing="6" fill="url(#nameGrad)" filter="url(#textGlow)">G S TEJAS</text>

    <line class="dash" x1="372" y1="270" x2="828" y2="270" stroke="url(#borderGrad)" stroke-width="2.2" stroke-linecap="round"/>

    <text x="600" y="312" text-anchor="middle" font-family="'Trebuchet MS', 'Segoe UI', Verdana, sans-serif"
          font-size="18" letter-spacing="5" fill="#bfe9ff" opacity="0.92">FULL&#8209;STACK DEVELOPER  &#183;  AI&#47;ML ENGINEER  &#183;  FOUNDER</text>
  </g>
</svg>
